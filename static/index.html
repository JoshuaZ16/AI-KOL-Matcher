<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AI KOL 达人匹配助手</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">AI KOL MATCHER</p>
          <h1>达人投放推荐工作台</h1>
        </div>
        <div class="status-strip" aria-live="polite">
          <span id="candidateCount">候选 0</span>
          <span id="averageScore">均分 0</span>
          <span id="plannedSpend">计划 ¥0</span>
        </div>
      </header>

      <main class="workspace">
        <section class="input-panel" aria-labelledby="requirementsTitle">
          <div class="section-heading">
            <p class="eyebrow">01</p>
            <h2 id="requirementsTitle">需求输入</h2>
          </div>

          <form id="requirementsForm" class="form-grid">
            <label class="field wide">
              <span>请描述你的投放需求</span>
              <textarea
                name="query"
                rows="4"
                placeholder="例如：想找计算机、AI、程序员相关的达人，风格专业但不要太硬广，预算每人 3000 以内，最好在 B 站或小红书。"
              ></textarea>
            </label>

            <label class="field wide">
              <span>推广产品/行业</span>
              <input name="product" type="text" placeholder="例如：校园求职课程" />
            </label>

            <label class="field wide">
              <span>目标人群</span>
              <input name="targetAudience" type="text" placeholder="例如：大学生、应届生、18-25岁" />
            </label>

            <div class="field wide">
              <span>达人 CSV</span>
              <div class="upload-box">
                <label class="file-button">
                  <input id="kolCsvInput" name="kolCsv" type="file" accept=".csv,text/csv" />
                  上传 CSV
                </label>
                <button id="clearKolCsvButton" class="secondary-button compact" type="button" disabled>清除</button>
                <p id="kolCsvStatus">未上传时使用默认达人库。</p>
              </div>
            </div>

            <div class="field wide">
              <span>投放平台</span>
              <div id="platformOptions" class="pill-group" data-name="platforms"></div>
            </div>

            <div class="field">
              <span>单个达人预算</span>
              <div class="range-row">
                <input name="singleBudget" type="range" min="800" max="8000" step="100" value="3000" />
                <strong id="singleBudgetValue">¥3,000</strong>
              </div>
            </div>

            <label class="field">
              <span>总预算</span>
              <input name="totalBudget" type="number" min="1000" step="500" value="20000" />
            </label>

            <div class="field wide">
              <span>内容领域</span>
              <div id="fieldOptions" class="pill-group" data-name="fields"></div>
            </div>

            <div class="field wide">
              <span>推广目标</span>
              <div class="segmented" role="radiogroup" aria-label="推广目标">
                <label><input type="radio" name="promotionGoal" value="拉新" />拉新</label>
                <label><input type="radio" name="promotionGoal" value="转化" />转化</label>
                <label><input type="radio" name="promotionGoal" value="曝光" />曝光</label>
                <label><input type="radio" name="promotionGoal" value="种草" checked />种草</label>
              </div>
            </div>

            <div class="field wide">
              <span>风险偏好</span>
              <div class="segmented risk" role="radiogroup" aria-label="风险偏好">
                <label><input type="radio" name="riskPreference" value="保守" />保守</label>
                <label><input type="radio" name="riskPreference" value="平衡" checked />平衡</label>
                <label><input type="radio" name="riskPreference" value="激进" />激进</label>
              </div>
            </div>

            <details class="advanced wide" open>
              <summary>可选条件</summary>
              <div class="advanced-grid">
                <label class="field">
                  <span>粉丝数下限</span>
                  <input name="followersMin" type="number" min="0" step="1000" placeholder="不限" />
                </label>
                <label class="field">
                  <span>粉丝数上限</span>
                  <input name="followersMax" type="number" min="0" step="1000" placeholder="不限" />
                </label>
                <label class="field">
                  <span>互动率下限 (%)</span>
                  <input name="engagementMin" type="number" min="0" step="0.1" placeholder="不限" />
                </label>
                <label class="field">
                  <span>转化率下限 (%)</span>
                  <input name="conversionMin" type="number" min="0" step="0.1" placeholder="不限" />
                </label>
                <label class="field">
                  <span>合作次数下限</span>
                  <input name="cooperationMin" type="number" min="0" step="1" placeholder="不限" />
                </label>
              </div>
            </details>

            <button class="primary-button wide" type="submit">生成 TOP10 推荐</button>
          </form>
        </section>

        <section class="results-panel" aria-labelledby="resultsTitle">
          <div class="section-heading result-heading">
            <div>
              <p class="eyebrow">02</p>
              <h2 id="resultsTitle">推荐结果</h2>
            </div>
            <button id="exportHtmlButton" class="secondary-button" type="button" disabled>导出 HTML</button>
          </div>
          <p id="summaryMessage" class="summary-message">填写需求后生成推荐。</p>

          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>排名</th>
                  <th>达人名称</th>
                  <th>平台</th>
                  <th>粉丝数</th>
                  <th>报价</th>
                  <th>综合分</th>
                  <th>ROI</th>
                  <th>风险</th>
                  <th>推荐理由</th>
                </tr>
              </thead>
              <tbody id="resultsBody"></tbody>
            </table>
          </div>
        </section>

        <aside class="detail-panel" aria-labelledby="detailTitle">
          <div class="section-heading">
            <p class="eyebrow">03</p>
            <h2 id="detailTitle">详情分析</h2>
          </div>
          <div id="detailContent" class="detail-empty">点击推荐结果中的达人查看详情。</div>
        </aside>
      </main>
    </div>

    <script src="/app.js" defer></script>
  </body>
</html>
